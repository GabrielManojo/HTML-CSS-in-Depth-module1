    <main>
        <h1>Blog</h1>

            <h2>20% Off this weekend</h2>

        </article>
        <article>
            <h2>Our New Menu</h2>
            <p>Check out our exciting new menu items!</p>
        </article>

        <!-- Sign Up Fors -->
        <section>
            <h2>Sign Up</h2>

            <form action="#" method="post">
                <fieldset>
                    <!-- <legend>Sign Up</legend> -->

                    <label for="user_first_name">First Name:</label>
                    <input type="text" id="user_first_name" name="user_first_name" placeholder="First Name:" required>

                    <label for="user_last_name">Last Name:</label>
                    <input type="text" id="user_last_name" name="user_last_name" placeholder="Last Name:" required>

                    <label for="user_email">Email:</label>
                    <input type="email" id="user_email" name="user_email" placeholder="Email:" required>

                    <label for="user_password">Password:</label>
                    <input type="password" id="user_password" name="user_password" placeholder="Password:" required>

                    <label for="user_confirm_password">Confirm Password:</label>
                    <input type="password" id="user_confirm_password" name="user_confirm_password"
                        placeholder="Confirm Password:" required>
                    <button type="submit">Sign Up</button>
                </fieldset>
            </form>
        </section>
    </main>
