<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book a Table | Little Lemon</title>

    <meta property="og:title" content="Our Menu">
    <meta property="og:type" content="Website">
    <meta property="og:image" content="logo.png">
    <meta property="og:url" content="https://littlelemon">
    <meta property="og:description"
        content="Little Lemon is a family-owned restaurant serving the best Mediterranean cuisine in town!">
    <meta property="og:locale" content="en_US">
    <meta property="og:site_name" content="Little Lemon">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <img src="logo.png" alt="Little Lemon Logo">
    </header>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="location.html">Location</a></li>
            <li><a href="blog.html">Blog</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="book.html">Book a Table</a></li>
        </ul>
    </nav>

    <main class="booking">
        <h1>Book a Table</h1>

        <section>
            <form action="#" method="post" class="booking-form">
                <fieldset>
                    <legend>Booking Date</legend>
                    <label for="booking_date">Select a date:</label>
                    <input type="date" id="booking_date" name="booking_date" required min="2026-03-06">
                </fieldset>
                <fieldset>
                    <legend>Party Size</legend>
                    <label for="booking_guests">
                        Number of guests:
                        <output id="guests_output">4</output>
                    </label>
                    <input type="range" id="booking_guests" name="booking_guests" min="1" max="10" value="4"
                        oninput="guests_output.value = this.value">
                </fieldset>
                <fieldset>
                    <legend>Location</legend>
                    <label for="booking_location">Select a location:</label>
                    <input name="booking_location" id="booking_location" placeholder="Enter location" list="locations"
                        required>
                    <datalist id="locations">
                        <option value="Downtown">
                        <option value="Uptown">
                    </datalist>
                </fieldset>
                <button type="submit">Book Now</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 Little Lemon. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>

</body>

</html>
